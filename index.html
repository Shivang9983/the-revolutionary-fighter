<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bhagat Singh — A Mind That Never Bent</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;0,900;1,500&family=Work+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="grain"></div>

  <header class="hero">
    <div class="arches" aria-hidden="true">
      <svg viewBox="0 0 1600 900" preserveAspectRatio="xMidYMax slice" xmlns="http://www.w3.org/2000/svg">
        <g class="arch-row">
          <path d="M0,900 L0,420 Q100,300 200,420 L200,900 Z" />
          <path d="M200,900 L200,420 Q300,300 400,420 L400,900 Z" />
          <path d="M400,900 L400,420 Q500,300 600,420 L600,900 Z" />
          <path d="M600,900 L600,420 Q700,300 800,420 L800,900 Z" />
          <path d="M800,900 L800,420 Q900,300 1000,420 L1000,900 Z" />
          <path d="M1000,900 L1000,420 Q1100,300 1200,420 L1200,900 Z" />
          <path d="M1200,900 L1200,420 Q1300,300 1400,420 L1400,900 Z" />
          <path d="M1400,900 L1400,420 Q1500,300 1600,420 L1600,900 Z" />
        </g>
      </svg>
    </div>

    <div class="smoke-field" aria-hidden="true">
      <svg viewBox="0 0 1600 900" preserveAspectRatio="xMidYMax slice" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <filter id="blurSoft" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="28"/>
          </filter>
          <filter id="blurHeavy" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="55"/>
          </filter>
        </defs>
        <ellipse class="smoke saffron s1" cx="420" cy="650" rx="260" ry="180" filter="url(#blurHeavy)"/>
        <ellipse class="smoke saffron s2" cx="300" cy="500" rx="180" ry="140" filter="url(#blurSoft)"/>
        <ellipse class="smoke white s1" cx="800" cy="600" rx="280" ry="190" filter="url(#blurHeavy)"/>
        <ellipse class="smoke white s2" cx="820" cy="430" rx="170" ry="130" filter="url(#blurSoft)"/>
        <ellipse class="smoke green s1" cx="1180" cy="650" rx="260" ry="180" filter="url(#blurHeavy)"/>
        <ellipse class="smoke green s2" cx="1300" cy="500" rx="180" ry="140" filter="url(#blurSoft)"/>
      </svg>
    </div>

    
  <script src="script.js"></script>
</body>
</html>
